name: Luma Outreach OS — Twice Daily Run

on:
  schedule:
    # 12:00 IST = 06:30 UTC
    - cron: "30 6 * * *"
    # 19:00 IST = 13:30 UTC
    - cron: "30 13 * * *"
  workflow_dispatch: {}

env:
  GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
  GOOGLE_CREDENTIALS_B64: ${{ secrets.GOOGLE_CREDENTIALS_B64 }}
  GMAIL_TOKEN_B64: ${{ secrets.GMAIL_TOKEN_B64 }}
  GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
  LINKEDIN_SESSION_B64: ${{ secrets.LINKEDIN_SESSION_B64 }}
  SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

jobs:
  outreach:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r luma_outreach_os/requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run Luma Outreach OS
        working-directory: luma_outreach_os
        run: python scripts/run_scheduler.py
